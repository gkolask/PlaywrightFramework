name: Trunk Flaky Tests Upload

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  upload-tests:
    runs-on: ubuntu-latest
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps
      - run: npm run test:playwright
      - name: Download Trunk Analytics CLI
        run: |
          curl -fL --retry 3 "https://github.com/trunk-io/analytics-cli/releases/download/0.13.2/trunk-analytics-cli-x86_64-unknown-linux.tar.gz" | tar -xz
          chmod +x trunk-analytics-cli
      - name: Validate JUnit report
        run: |
          ./trunk-analytics-cli validate --junit-paths "reports/junit-results.xml"
      - name: Upload JUnit report to Trunk
        run: |
          ./trunk-analytics-cli upload --junit-paths "reports/junit-results.xml" \
            --org-url-slug "shriram" \
            --token "$TRUNK_API_TOKEN"
